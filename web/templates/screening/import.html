{% extends "base.html" %}
{% block header %}
    <h1 data-goatcounter-skip="true">
        {% block title %}
            Importar sessões
        {% endblock title %}
    </h1>
{% endblock header %}
{% block content %}
    <form method="post" enctype="multipart/form-data">
        <p>Selecione um arquivo .json válido para realizar a importação.</p>
        <div class="mb-3">
            <label for="json_file" class="form-label">Arquivo json</label>
            <input class="form-control"
                   name="json_file"
                   type="file"
                   id="json_file"
                   accept=".json,application/json"
                   required />
        </div>
        <div class="container mb-3 pb-3 ps-0">
            <input class="btn btn-primary" type="submit" value="Enviar" />
        </div>
    </form>
{% endblock content %}
