name: Fetch Movie Metadata

on:
  schedule:
    - cron: "20 12 * * *" # Everyday at 12:20, after Fetch Posters
  workflow_dispatch:

jobs:
  fetch-movie-metadata:
    if: ${{ github.repository == 'cumbucadev/cinemaempoa' }}
    name: Fetch Movie Metadata
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Checkout
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username:  ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            docker exec cinemaempoa_flask bash -c "flask --app flask_backend fetch-movie-metadata"
