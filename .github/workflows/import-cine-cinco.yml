name: Import Cine Cinco

on:
  schedule:
    - cron: "0 8,12,18,23 * * *"
  workflow_dispatch:

jobs:
  import-cine-cinco:
    if: ${{ github.repository == 'cumbucadev/cinemaempoa' }}
    name: Import Cine Cinco
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Checkout
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username:  ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            docker exec cinemaempoa_flask bash -c "python cinemaempoa.py -r cine-cinco > /app/import.json"
            docker exec cinemaempoa_flask bash -c "flask --app flask_backend import-json /app/import.json"
