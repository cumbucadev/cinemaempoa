name: CI (PR)

on:
  pull_request:

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4.1.3
            - uses: astral-sh/setup-uv@v8.3.2
              with:
                python-version: '3.14.5'
            - run: uv sync --frozen
            - run: uv run ruff check
            - run: uv run ruff format
            - run: uv run djlint flask_backend/templates --lint --profile=jinja
            - run: uv run djlint --reformat flask_backend/templates --format-css --format-js

    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4.1.3
            - uses: astral-sh/setup-uv@v8.3.2
              with:
                python-version: '3.14.5'
            - run: uv sync --frozen
            - run: uv run coverage run -m pytest
            - run: uv run coverage report -m --fail-under=90

    quality:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4.1.3
            - uses: astral-sh/setup-uv@v8.3.2
              with:
                python-version: '3.14.5'
            - run: uv sync --frozen
            - run: uv run vulture flask_backend scrapers cinemaempoa.py vulture_whitelist.py --exclude "*/tests/*" --min-confidence 80
              continue-on-error: true
            - run: uv run xenon --max-absolute B --max-modules A --max-average A flask_backend scrapers --exclude "*/tests/*"
              continue-on-error: true