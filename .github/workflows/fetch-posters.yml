name: Fetch Posters

on:
  schedule:
    - cron: "5 12 * * *" # Everyday at 12:05
  workflow_dispatch:

jobs:
  fetch-posters:
    if: ${{ github.repository == 'cumbucadev/cinemaempoa' }}
    name: Fetch Posters
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install runner dependencies
        run: pip install -r requirements.runner.txt

      - name: Find and update missing posters
        run: |
          python runner/main.py \
            --poster-only \
            --api-url ${{ secrets.APP_URL }} \
            --api-token ${{ secrets.IMPORT_API_TOKEN }}
