name: Remote SSH Command

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy-cinemaempoa:
    if: ${{ github.repository == 'cumbucadev/cinemaempoa' }}
    name: Deploy Cinema Em POA
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: checkout
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            set -euo pipefail

            cd cinemaempoa
            git pull

            echo "🔄 Building Docker image..."
            docker compose -f docker-compose.shared.yml build flask

            echo "🔄 Running database migrations..."
            docker compose -f docker-compose.shared.yml run --rm flask flask --app flask_backend db-upgrade
            echo "✅ Migrations completed."

            echo "🚀 Starting application..."
            docker compose -f docker-compose.shared.yml up -d flask

            echo "🗑️  Removing all stopped containers..."
            docker container prune -f
            echo "✅ Stopped containers removed."

            echo "🧹 Cleaning up old Docker images (older than 12h)..."
            docker image prune -a -f --filter "until=12h"
            echo "✅ Old unused images cleaned up."

            echo "🎉 Docker cleanup complete!"
