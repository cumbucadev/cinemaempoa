name: Import CineBancarios

on:
  schedule:
    - cron: "0 3 * * 4" # At 03:00 UTC every thursday (every 7 days)
  workflow_dispatch:

jobs:
  import-cinebancarios:
    if: ${{ github.repository == 'cumbucadev/cinemaempoa' }}
    name: Import CineBancarios
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install runner dependencies
        run: pip install -r requirements.runner.txt

      - name: Run CineBancários scraper and import
        run: |
          python runner/main.py \
            --rooms cinebancarios \
            --api-url ${{ secrets.APP_URL }} \
            --api-token ${{ secrets.IMPORT_API_TOKEN }}
