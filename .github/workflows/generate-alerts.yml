name: Generate Movie Alerts

on:
  schedule:
    - cron: "35 12 * * *" # Everyday at 12:35, after Fetch Movie Metadata
  workflow_dispatch:

jobs:
  generate-alerts:
    if: ${{ github.repository == 'cumbucadev/cinemaempoa' }}
    name: Generate Movie Alerts
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Checkout
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username:  ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            docker exec cinemaempoa_flask bash -c "flask --app flask_backend generate-alerts"
